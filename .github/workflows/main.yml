name: Update Stock Data
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 아래 permissions 섹션이 매우 중요합니다! (권한 부여)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v3에서 v4로 업데이트
      - name: Python 설치
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트
        with:
          python-version: '3.11' # 안정적인 최신 버전 사용

      - name: 라이브러리 설치
        run: pip install yfinance

      - name: 스크립트 실행
        run: python update_data.py

      - name: 변경사항 저장 및 푸시
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Update stock data: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
